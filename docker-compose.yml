services:
  scp-planner:
    image: scp-planner:latest
    build: .
    init: true  # proper signal handling (graceful shutdown)
    ports:
      - "8000:8000"
    volumes:
      # /app/data holds the SQLite db — persists across restarts & upgrades
      - scp-data:/app/data
      # Uploaded Excel files — bind mount so they're easy to back up
      - ./data/uploads:/app/backend/uploads
      # Frontend dist — bind mount so local rebuilds are served immediately
      - ./frontend/dist:/app/frontend/dist
      # Backend source — bind mount so local .py edits are picked up immediately
      - ./backend:/app/backend
    command: ["python", "-m", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      - DATABASE_PATH=/app/data/scmp.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  scp-data:
